apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
  labels:
    app: qa-rag-pipeline
data:
  POSTGRES_USER: {{ .Values.config.postgresUser | quote }}
  POSTGRES_DB: {{ .Values.config.postgresDb | quote }}
  POSTGRES_HOST: {{ .Release.Name }}-postgres
  POSTGRES_PORT: "5432"
  QDRANT_HOST: {{ .Release.Name }}-qdrant
  QDRANT_PORT: {{ .Values.config.qdrantPort | quote }}
  EXTRACTION_SERVICE_URL: "http://{{ .Release.Name }}-extraction:8000"
