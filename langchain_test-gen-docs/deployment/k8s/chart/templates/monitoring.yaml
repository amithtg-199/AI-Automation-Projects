apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-prometheus
  labels:
    app: qa-rag-prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qa-rag-prometheus
  template:
    metadata:
      labels:
        app: qa-rag-prometheus
    spec:
      containers:
        - name: prometheus
          image: {{ .Values.images.prometheus }}
          ports:
            - containerPort: 9090
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-prometheus
  labels:
    app: qa-rag-prometheus
spec:
  type: ClusterIP
  ports:
    - port: 9090
      targetPort: 9090
  selector:
    app: qa-rag-prometheus
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-grafana
  labels:
    app: qa-rag-grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qa-rag-grafana
  template:
    metadata:
      labels:
        app: qa-rag-grafana
    spec:
      containers:
        - name: grafana
          image: {{ .Values.images.grafana }}
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin"
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-grafana
  labels:
    app: qa-rag-grafana
spec:
  type: LoadBalancer
  ports:
    - port: 3000
      targetPort: 3000
  selector:
    app: qa-rag-grafana
