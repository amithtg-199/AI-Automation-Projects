# Default values for qa-rag-pipeline

images:
  api: "your-registry.com/qa_rag_api:latest"
  extraction: "your-registry.com/qa_rag_extraction:latest"
  postgres: "postgres:17-alpine"
  qdrant: "qdrant/qdrant:v1.14.0"
  prometheus: "prom/prometheus:latest"
  grafana: "grafana/grafana:latest"

pullPolicy: IfNotPresent

config:
  postgresUser: "qa_user"
  postgresDb: "qa_rag"
  qdrantPort: 6333

secrets:
  # Base64 encoded or string secrets (In production, use ExternalSecrets or sealed-secrets)
  postgresPassword: "secure_password"
  llmProvider: "mistral"
  llmModelName: "mistral-large-latest"
  llmApiKey: "YOUR_MISTRAL_API_KEY"
  masterKey: "" # Set this to decrypt ENC: values

persistence:
  storageClass: "" # Leave empty for default cloud provider storage class (e.g., gp2, managed-csi)
  postgresSize: "10Gi"
  qdrantSize: "10Gi"

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
