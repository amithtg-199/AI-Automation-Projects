version: '3.8'

services:
  # ──────────────────────────────────────────────────────────────────────────
  # PostgreSQL Database (Parent Store)
  # ──────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: qa_rag_postgres
    restart: unless-stopped
    env_file:
      - ../../.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-qa_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────────────────────
  # Qdrant Vector Database (Child Chunks)
  # ──────────────────────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.14.0
    container_name: qa_rag_qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "${QDRANT_PORT:-6333}:6333"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/127.0.0.1/6333"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────────────────────
  # Extraction Service (Docling / Unstructured)
  # ──────────────────────────────────────────────────────────────────────────
  extraction-service:
    build:
      context: ../../extraction-service
      dockerfile: Dockerfile
    container_name: qa_rag_extraction
    restart: unless-stopped
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ──────────────────────────────────────────────────────────────────────────
  # Core RAG Application (FastAPI + LangChain)
  # ──────────────────────────────────────────────────────────────────────────
  qa-rag-api:
    build:
      context: ../../
      dockerfile: Dockerfile
    container_name: qa_rag_api
    restart: unless-stopped
    ports:
      - "5679:5679"
    env_file:
      - ../../.env
    volumes:
      - ../../logs:/app/logs
      - ../../output_documents:/app/output_documents
    environment:
      - POSTGRES_HOST=qa_rag_postgres
      - QDRANT_HOST=qa_rag_qdrant
      - EXTRACTION_SERVICE_URL=http://qa_rag_extraction:8000
      - MASTER_KEY=${MASTER_KEY:-}
      - EVAL_DELAY_SECONDS=${EVAL_DELAY_SECONDS:-5}
      - EVAL_TIMEOUT=${EVAL_TIMEOUT:-600}
      - EVAL_MAX_RETRIES=${EVAL_MAX_RETRIES:-20}
      - EVAL_MAX_WAIT=${EVAL_MAX_WAIT:-120}
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      extraction-service:
        condition: service_healthy

  # ──────────────────────────────────────────────────────────────────────────
  # Observability: Prometheus
  # ──────────────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: qa_rag_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  # ──────────────────────────────────────────────────────────────────────────
  # Observability: Grafana
  # ──────────────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: qa_rag_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus

  # ──────────────────────────────────────────────────────────────────────────
  # Local LLM: Ollama (Optional)
  # ──────────────────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: qa_rag_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - local-llm

volumes:
  postgres_data:
  qdrant_data:
  ollama_data:
